---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Deploy frontend dashboard
  template:
    src: index.html.j2
    dest: /var/www/html/index.html

- name: Deploy nginx reverse proxy config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default

- name: Test nginx configuration
  command: nginx -t

- name: Restart nginx
  service:
    name: nginx
    state: restarted
    enabled: yes